# fly.toml app configuration file generated for bolonga-jr on 2026-05-03T22:19:20Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'bolonga-jr'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
